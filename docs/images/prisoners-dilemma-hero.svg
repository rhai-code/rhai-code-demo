<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="redGlow" cx="30%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#CC0000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#CC0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="70%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#76B900" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#76B900" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerClash" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="divider" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0"/>
      <stop offset="30%" stop-color="#FFD700" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#FFD700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="800" fill="#0a0a14"/>
  <!-- Team glows -->
  <rect width="600" height="800" fill="url(#redGlow)"/>
  <rect x="600" width="600" height="800" fill="url(#greenGlow)"/>
  <circle cx="600" cy="400" r="250" fill="url(#centerClash)"/>
  <!-- Center divider line -->
  <line x1="600" y1="0" x2="600" y2="800" stroke="url(#divider)" stroke-width="2"/>

  <!-- Crimson Dynamics - angular diamond/arrow emblem -->
  <g transform="translate(280,350)" filter="url(#glow)">
    <!-- Outer diamond -->
    <polygon points="0,-75 65,0 0,75 -65,0" fill="none" stroke="#CC0000" stroke-width="3" opacity="0.9"/>
    <!-- Inner diamond -->
    <polygon points="0,-45 38,0 0,45 -38,0" fill="#CC0000" opacity="0.15"/>
    <polygon points="0,-45 38,0 0,45 -38,0" fill="none" stroke="#EE0000" stroke-width="2" opacity="0.8"/>
    <!-- Dynamic arrow pointing right -->
    <polygon points="-20,-20 25,0 -20,20 -10,0" fill="#CC0000" opacity="0.8"/>
    <!-- Speed lines -->
    <line x1="-55" y1="-15" x2="-30" y2="-15" stroke="#CC0000" stroke-width="1.5" opacity="0.5"/>
    <line x1="-60" y1="0" x2="-28" y2="0" stroke="#CC0000" stroke-width="2" opacity="0.6"/>
    <line x1="-55" y1="15" x2="-30" y2="15" stroke="#CC0000" stroke-width="1.5" opacity="0.5"/>
    <!-- Corner accents -->
    <circle cx="0" cy="-75" r="4" fill="#FF3333" opacity="0.7"/>
    <circle cx="0" cy="75" r="4" fill="#FF3333" opacity="0.7"/>
  </g>

  <!-- Verdant Systems - leaf/circuit emblem -->
  <g transform="translate(920,350)" filter="url(#glow)">
    <!-- Outer hexagon -->
    <polygon points="0,-70 61,-35 61,35 0,70 -61,35 -61,-35" fill="none" stroke="#76B900" stroke-width="3" opacity="0.9"/>
    <!-- Inner hexagon -->
    <polygon points="0,-42 36,-21 36,21 0,42 -36,21 -36,-21" fill="#76B900" opacity="0.12"/>
    <polygon points="0,-42 36,-21 36,21 0,42 -36,21 -36,-21" fill="none" stroke="#8DD100" stroke-width="1.5" opacity="0.7"/>
    <!-- Leaf/branch shape -->
    <path d="M0,30 C0,0 -15,-15 -5,-35 C5,-15 20,-5 25,5 C15,0 5,10 0,30 Z" fill="#76B900" opacity="0.7"/>
    <!-- Circuit veins on leaf -->
    <line x1="0" y1="25" x2="0" y2="-20" stroke="#8DD100" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="5" x2="12" y2="-5" stroke="#8DD100" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="-5" x2="-8" y2="-15" stroke="#8DD100" stroke-width="0.8" opacity="0.4"/>
    <!-- Node dots -->
    <circle cx="0" cy="-20" r="3" fill="#8DD100" opacity="0.8"/>
    <circle cx="12" cy="-5" r="2.5" fill="#8DD100" opacity="0.7"/>
    <circle cx="-8" cy="-15" r="2.5" fill="#8DD100" opacity="0.7"/>
  </g>

  <!-- VS lightning bolt center -->
  <g transform="translate(600,380)">
    <polygon points="-8,-60 12,-10 -2,-10 8,60 -12,10 2,10" fill="#FFD700" opacity="0.9"/>
  </g>
  <!-- Game theory grid - subtle -->
  <g transform="translate(430,550)" opacity="0.3">
    <rect x="0" y="0" width="70" height="35" fill="none" stroke="#CC0000" stroke-width="1"/>
    <rect x="70" y="0" width="70" height="35" fill="none" stroke="#76B900" stroke-width="1"/>
    <rect x="0" y="35" width="70" height="35" fill="none" stroke="#CC0000" stroke-width="1"/>
    <rect x="70" y="35" width="70" height="35" fill="none" stroke="#76B900" stroke-width="1"/>
    <text x="35" y="22" text-anchor="middle" fill="#CC0000" font-size="11" font-family="monospace">+3</text>
    <text x="105" y="22" text-anchor="middle" fill="#76B900" font-size="11" font-family="monospace">+5</text>
    <text x="35" y="57" text-anchor="middle" fill="#CC0000" font-size="11" font-family="monospace">0</text>
    <text x="105" y="57" text-anchor="middle" fill="#76B900" font-size="11" font-family="monospace">-1</text>
    <text x="35" y="-8" text-anchor="middle" fill="#aaa" font-size="9" font-family="monospace">COOPERATE</text>
    <text x="105" y="-8" text-anchor="middle" fill="#aaa" font-size="9" font-family="monospace">DECEIVE</text>
  </g>
  <!-- Floating particles -->
  <g opacity="0.4">
    <circle cx="150" cy="150" r="2" fill="#CC0000"/>
    <circle cx="200" cy="250" r="1.5" fill="#CC0000"/>
    <circle cx="350" cy="180" r="2.5" fill="#CC0000"/>
    <circle cx="100" cy="500" r="1.5" fill="#CC0000"/>
    <circle cx="400" cy="650" r="2" fill="#CC0000"/>
    <circle cx="1050" cy="150" r="2" fill="#76B900"/>
    <circle cx="1000" cy="250" r="1.5" fill="#76B900"/>
    <circle cx="850" cy="180" r="2.5" fill="#76B900"/>
    <circle cx="1100" cy="500" r="1.5" fill="#76B900"/>
    <circle cx="800" cy="650" r="2" fill="#76B900"/>
  </g>
  <!-- Connection lines between sides -->
  <g opacity="0.15">
    <line x1="370" y1="350" x2="830" y2="350" stroke="#FFD700" stroke-width="0.5" stroke-dasharray="4,8"/>
    <line x1="370" y1="400" x2="830" y2="400" stroke="#FFD700" stroke-width="0.5" stroke-dasharray="4,8"/>
    <line x1="400" y1="300" x2="800" y2="300" stroke="#FFD700" stroke-width="0.5" stroke-dasharray="4,8"/>
    <line x1="400" y1="450" x2="800" y2="450" stroke="#FFD700" stroke-width="0.5" stroke-dasharray="4,8"/>
  </g>
</svg>
