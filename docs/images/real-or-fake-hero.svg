<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0f0a20"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="realGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#00CC66"/>
    </linearGradient>
    <linearGradient id="fakeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF3366"/>
      <stop offset="100%" stop-color="#CC0044"/>
    </linearGradient>
    <linearGradient id="dividerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="leftClip"><rect x="0" y="0" width="395" height="500"/></clipPath>
    <clipPath id="rightClip"><rect x="405" y="0" width="395" height="500"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/><line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>

  <!-- LEFT SIDE: "Real" photo-like representation -->
  <g clip-path="url(#leftClip)">
    <!-- Realistic landscape silhouette -->
    <g opacity="0.3">
      <path d="M0,350 Q50,280 100,310 Q140,260 180,290 Q220,230 260,270 Q300,220 340,260 Q370,240 395,250 L395,500 L0,500 Z" fill="#00FF88" opacity="0.15"/>
      <path d="M0,380 Q80,340 140,360 Q200,320 260,350 Q320,310 395,340 L395,500 L0,500 Z" fill="#00FF88" opacity="0.1"/>
    </g>
    <!-- Camera viewfinder corners -->
    <g stroke="#00FF88" stroke-width="2" fill="none" opacity="0.6">
      <path d="M60,100 L60,70 L90,70"/>
      <path d="M310,70 L340,70 L340,100"/>
      <path d="M60,370 L60,400 L90,400"/>
      <path d="M310,400 L340,400 L340,370"/>
    </g>
    <!-- Focus point -->
    <circle cx="200" cy="235" r="30" fill="none" stroke="#00FF88" stroke-width="1" opacity="0.4"/>
    <circle cx="200" cy="235" r="2" fill="#00FF88" opacity="0.6"/>
    <line x1="200" y1="200" x2="200" y2="215" stroke="#00FF88" stroke-width="1" opacity="0.4"/>
    <line x1="200" y1="255" x2="200" y2="270" stroke="#00FF88" stroke-width="1" opacity="0.4"/>
    <line x1="165" y1="235" x2="180" y2="235" stroke="#00FF88" stroke-width="1" opacity="0.4"/>
    <line x1="220" y1="235" x2="235" y2="235" stroke="#00FF88" stroke-width="1" opacity="0.4"/>
    <!-- Photo icon -->
    <g transform="translate(160, 140)" filter="url(#glow)">
      <rect x="0" y="8" width="80" height="56" rx="6" fill="none" stroke="#00FF88" stroke-width="2"/>
      <circle cx="40" cy="38" r="14" fill="none" stroke="#00FF88" stroke-width="2"/>
      <circle cx="40" cy="38" r="5" fill="#00FF88" opacity="0.5"/>
      <rect x="28" y="4" width="24" height="10" rx="3" fill="none" stroke="#00FF88" stroke-width="1.5"/>
    </g>
    <!-- "REAL" label -->
    <g filter="url(#strongGlow)">
      <text x="200" y="440" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#realGrad)" text-anchor="middle" letter-spacing="8">REAL</text>
    </g>
    <!-- Checkmark -->
    <g transform="translate(200, 320)" filter="url(#glow)">
      <circle r="20" fill="none" stroke="#00FF88" stroke-width="2"/>
      <path d="M-8,0 L-2,7 L10,-7" fill="none" stroke="#00FF88" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- CENTER DIVIDER -->
  <rect x="398" y="0" width="4" height="500" fill="url(#dividerGrad)"/>
  <!-- VS circle -->
  <circle cx="400" cy="250" r="22" fill="#0a0a1a" stroke="#ffffff" stroke-width="2"/>
  <text x="400" y="257" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">VS</text>

  <!-- RIGHT SIDE: "Fake" AI-generated representation -->
  <g clip-path="url(#rightClip)">
    <!-- Glitchy/digital landscape -->
    <g opacity="0.3">
      <path d="M405,340 L440,300 L460,320 L490,270 L520,310 L550,250 L580,290 L620,240 L660,280 L700,230 L740,270 L780,250 L800,260 L800,500 L405,500 Z" fill="#FF3366" opacity="0.15"/>
      <rect x="450" y="310" width="40" height="3" fill="#FF3366" opacity="0.2"/>
      <rect x="550" y="280" width="60" height="2" fill="#FF3366" opacity="0.15"/>
      <rect x="650" y="330" width="35" height="3" fill="#FF3366" opacity="0.2"/>
    </g>
    <!-- Neural network nodes -->
    <g opacity="0.4">
      <circle cx="480" cy="150" r="4" fill="#FF3366"/>
      <circle cx="540" cy="120" r="3" fill="#FF3366"/>
      <circle cx="600" cy="160" r="4" fill="#FF3366"/>
      <circle cx="660" cy="130" r="3" fill="#FF3366"/>
      <circle cx="720" cy="155" r="4" fill="#FF3366"/>
      <circle cx="510" cy="200" r="3" fill="#FF3366"/>
      <circle cx="570" cy="220" r="4" fill="#FF3366"/>
      <circle cx="630" cy="195" r="3" fill="#FF3366"/>
      <circle cx="690" cy="210" r="4" fill="#FF3366"/>
      <line x1="480" y1="150" x2="540" y2="120" stroke="#FF3366" stroke-width="0.5"/>
      <line x1="540" y1="120" x2="600" y2="160" stroke="#FF3366" stroke-width="0.5"/>
      <line x1="600" y1="160" x2="660" y2="130" stroke="#FF3366" stroke-width="0.5"/>
      <line x1="660" y1="130" x2="720" y2="155" stroke="#FF3366" stroke-width="0.5"/>
      <line x1="480" y1="150" x2="510" y2="200" stroke="#FF3366" stroke-width="0.5"/>
      <line x1="540" y1="120" x2="570" y2="220" stroke="#FF3366" stroke-width="0.5"/>
      <line x1="600" y1="160" x2="630" y2="195" stroke="#FF3366" stroke-width="0.5"/>
      <line x1="660" y1="130" x2="690" y2="210" stroke="#FF3366" stroke-width="0.5"/>
      <line x1="510" y1="200" x2="570" y2="220" stroke="#FF3366" stroke-width="0.5"/>
      <line x1="570" y1="220" x2="630" y2="195" stroke="#FF3366" stroke-width="0.5"/>
      <line x1="630" y1="195" x2="690" y2="210" stroke="#FF3366" stroke-width="0.5"/>
    </g>
    <!-- AI chip/brain icon -->
    <g transform="translate(560, 140)" filter="url(#glow)">
      <rect x="0" y="0" width="80" height="80" rx="8" fill="none" stroke="#FF3366" stroke-width="2"/>
      <rect x="15" y="15" width="50" height="50" rx="4" fill="none" stroke="#FF3366" stroke-width="1.5"/>
      <!-- Chip pins -->
      <line x1="25" y1="0" x2="25" y2="-8" stroke="#FF3366" stroke-width="2"/>
      <line x1="40" y1="0" x2="40" y2="-8" stroke="#FF3366" stroke-width="2"/>
      <line x1="55" y1="0" x2="55" y2="-8" stroke="#FF3366" stroke-width="2"/>
      <line x1="25" y1="80" x2="25" y2="88" stroke="#FF3366" stroke-width="2"/>
      <line x1="40" y1="80" x2="40" y2="88" stroke="#FF3366" stroke-width="2"/>
      <line x1="55" y1="80" x2="55" y2="88" stroke="#FF3366" stroke-width="2"/>
      <line x1="0" y1="25" x2="-8" y2="25" stroke="#FF3366" stroke-width="2"/>
      <line x1="0" y1="40" x2="-8" y2="40" stroke="#FF3366" stroke-width="2"/>
      <line x1="0" y1="55" x2="-8" y2="55" stroke="#FF3366" stroke-width="2"/>
      <line x1="80" y1="25" x2="88" y2="25" stroke="#FF3366" stroke-width="2"/>
      <line x1="80" y1="40" x2="88" y2="40" stroke="#FF3366" stroke-width="2"/>
      <line x1="80" y1="55" x2="88" y2="55" stroke="#FF3366" stroke-width="2"/>
      <!-- Brain circuit inside -->
      <circle cx="40" cy="40" r="10" fill="none" stroke="#FF3366" stroke-width="1"/>
      <text x="40" y="45" font-family="monospace" font-size="12" fill="#FF3366" text-anchor="middle">AI</text>
    </g>
    <!-- Warning/question -->
    <g transform="translate(600, 320)" filter="url(#glow)">
      <circle r="20" fill="none" stroke="#FF3366" stroke-width="2"/>
      <text y="7" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="bold" fill="#FF3366" text-anchor="middle">?</text>
    </g>
    <!-- "FAKE" label -->
    <g filter="url(#strongGlow)">
      <text x="600" y="440" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#fakeGrad)" text-anchor="middle" letter-spacing="8">FAKE</text>
    </g>
    <!-- Glitch lines -->
    <g opacity="0.3">
      <rect x="420" y="270" width="120" height="2" fill="#FF3366">
        <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="650" y="300" width="80" height="2" fill="#FF3366">
        <animate attributeName="opacity" values="0;0.3;0" dur="1.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="500" y="360" width="100" height="1" fill="#FF3366">
        <animate attributeName="opacity" values="0.2;0;0.2" dur="3s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- Top center question -->
  <g filter="url(#glow)">
    <text x="400" y="45" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" opacity="0.6" letter-spacing="4">CAN YOU SPOT THE DIFFERENCE?</text>
  </g>

  <!-- Bottom subtitle -->
  <text x="400" y="485" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.35" letter-spacing="2">SYNTHETIC DATA GENERATION</text>

  <!-- Scanning line animation -->
  <rect x="0" y="0" width="800" height="2" fill="#ffffff" opacity="0.08">
    <animate attributeName="y" values="0;500;0" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
