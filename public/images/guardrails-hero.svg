<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="shieldGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dangerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF0044" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF0044" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39FF14"/>
      <stop offset="100%" stop-color="#00AA44"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="800" fill="#0d1117"/>
  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="0" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="60" y1="0" x2="60" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="120" y1="0" x2="120" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="180" y1="0" x2="180" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="240" y1="0" x2="240" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="300" y1="0" x2="300" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="360" y1="0" x2="360" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="420" y1="0" x2="420" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="480" y1="0" x2="480" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="540" y1="0" x2="540" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="600" y1="0" x2="600" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="660" y1="0" x2="660" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="720" y1="0" x2="720" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="780" y1="0" x2="780" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="840" y1="0" x2="840" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="900" y1="0" x2="900" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="960" y1="0" x2="960" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="1020" y1="0" x2="1020" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="1080" y1="0" x2="1080" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="1140" y1="0" x2="1140" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="1200" y1="0" x2="1200" y2="800" stroke="#39FF14" stroke-width="1" />
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#39FF14" stroke-width="1" />
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#39FF14" stroke-width="1" />
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#39FF14" stroke-width="1" />
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#39FF14" stroke-width="1" />
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#39FF14" stroke-width="1" />
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#39FF14" stroke-width="1" />
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#39FF14" stroke-width="1" />
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#39FF14" stroke-width="1" />
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#39FF14" stroke-width="1" />
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#39FF14" stroke-width="1" />
    <line x1="0" y1="660" x2="1200" y2="660" stroke="#39FF14" stroke-width="1" />
    <line x1="0" y1="720" x2="1200" y2="720" stroke="#39FF14" stroke-width="1" />
    <line x1="0" y1="780" x2="1200" y2="780" stroke="#39FF14" stroke-width="1" />
  </g>
  <!-- Ambient glows -->
  <circle cx="600" cy="360" r="350" fill="url(#shieldGlow)"/>
  <circle cx="200" cy="200" r="200" fill="url(#dangerGlow)"/>
  <circle cx="1000" cy="600" r="200" fill="url(#dangerGlow)"/>
  <!-- Shield icon - large center -->
  <g transform="translate(600,350)">
    <path d="M0,-160 L130,-110 L130,40 C130,120 0,190 0,190 C0,190 -130,120 -130,40 L-130,-110 Z"
      fill="none" stroke="url(#shieldGrad)" stroke-width="3" opacity="0.9"/>
    <path d="M0,-130 L105,-90 L105,30 C105,95 0,155 0,155 C0,155 -105,95 -105,30 L-105,-90 Z"
      fill="none" stroke="#39FF14" stroke-width="1.5" opacity="0.4"/>
    <!-- Checkmark inside shield -->
    <polyline points="-35,10 -10,40 45,-30" fill="none" stroke="#39FF14" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>
  <!-- Blocked threats - X marks -->
  <g opacity="0.6">
    <!-- Top left threat -->
    <g transform="translate(180,180)">
      <circle cx="0" cy="0" r="25" fill="none" stroke="#FF0044" stroke-width="2"/>
      <line x1="-12" y1="-12" x2="12" y2="12" stroke="#FF0044" stroke-width="3"/>
      <line x1="12" y1="-12" x2="-12" y2="12" stroke="#FF0044" stroke-width="3"/>
    </g>
    <!-- Bottom right threat -->
    <g transform="translate(1020,580)">
      <circle cx="0" cy="0" r="25" fill="none" stroke="#FF0044" stroke-width="2"/>
      <line x1="-12" y1="-12" x2="12" y2="12" stroke="#FF0044" stroke-width="3"/>
      <line x1="12" y1="-12" x2="-12" y2="12" stroke="#FF0044" stroke-width="3"/>
    </g>
    <!-- Mid left threat -->
    <g transform="translate(250,500)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#FF0044" stroke-width="1.5"/>
      <line x1="-9" y1="-9" x2="9" y2="9" stroke="#FF0044" stroke-width="2.5"/>
      <line x1="9" y1="-9" x2="-9" y2="9" stroke="#FF0044" stroke-width="2.5"/>
    </g>
    <!-- Top right threat -->
    <g transform="translate(950,200)">
      <circle cx="0" cy="0" r="20" fill="none" stroke="#FF0044" stroke-width="1.5"/>
      <line x1="-10" y1="-10" x2="10" y2="10" stroke="#FF0044" stroke-width="2.5"/>
      <line x1="10" y1="-10" x2="-10" y2="10" stroke="#FF0044" stroke-width="2.5"/>
    </g>
  </g>
  <!-- Data streams flowing toward shield -->
  <g opacity="0.25">
    <line x1="100" y1="100" x2="480" y2="280" stroke="#FF0044" stroke-width="1" stroke-dasharray="8,6"/>
    <line x1="1100" y1="150" x2="720" y2="280" stroke="#FF0044" stroke-width="1" stroke-dasharray="8,6"/>
    <line x1="150" y1="650" x2="500" y2="450" stroke="#FF0044" stroke-width="1" stroke-dasharray="8,6"/>
    <line x1="1050" y1="700" x2="700" y2="450" stroke="#FF0044" stroke-width="1" stroke-dasharray="8,6"/>
  </g>
  <!-- Lemon accent -->
  <g transform="translate(900,150)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="22" ry="16" fill="#FFDC00"/>
    <ellipse cx="0" cy="0" rx="18" ry="13" fill="#FFE84D"/>
    <path d="M-22,0 C-28,-4 -28,4 -22,0" fill="#FFDC00"/>
    <path d="M22,0 C28,-4 28,4 22,0" fill="#FFDC00"/>
  </g>
</svg>
